<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woojin · Workspace</title>
<style>
:root{
  --bg:#0f1115; --ink:#f2f4f8; --sub:#9aa6b8; --faint:#5d6b7d;
  --line:#262e3a;
  --jp1:#4ea1ff; --jp2:#3dd6a0;
  --dz1:#ff7a59; --dz2:#f5b94a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0f1115;
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 20px;
  background-image:
    radial-gradient(900px 500px at 15% -5%, rgba(78,161,255,.10), transparent 60%),
    radial-gradient(900px 500px at 85% 105%, rgba(255,122,89,.10), transparent 60%);
}
.wrap{width:100%;max-width:760px}
header.intro{text-align:center;margin-bottom:40px}
.eyebrow{font-size:12px;font-weight:700;letter-spacing:.18em;color:var(--faint);text-transform:uppercase}
h1{font-size:34px;font-weight:800;letter-spacing:-.03em;margin-top:12px;line-height:1.15}
.intro p{color:var(--sub);font-size:14px;margin-top:12px}

.cards{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:600px){.cards{grid-template-columns:1fr}h1{font-size:27px}}

.card{
  position:relative;display:block;text-decoration:none;color:inherit;
  background:#161b24;border:1px solid var(--line);border-radius:22px;
  padding:26px 24px 24px;overflow:hidden;
  transition:transform .16s ease,border-color .16s ease;
  min-height:230px;display:flex;flex-direction:column;
}
.card:hover{transform:translateY(-4px)}
.card .glow{position:absolute;inset:0;opacity:.0;transition:opacity .2s;pointer-events:none}
.card.jp:hover{border-color:var(--jp1)}
.card.jp:hover .glow{opacity:1;background:radial-gradient(400px 200px at 50% 0%,rgba(78,161,255,.14),transparent 70%)}
.card.dz:hover{border-color:var(--dz1)}
.card.dz:hover .glow{opacity:1;background:radial-gradient(400px 200px at 50% 0%,rgba(255,122,89,.14),transparent 70%)}

.emoji{font-size:40px;line-height:1}
.card h2{font-size:21px;font-weight:800;letter-spacing:-.02em;margin-top:18px}
.card .ja{font-size:13px;color:var(--sub);font-weight:600;margin-top:4px}
.card .desc{font-size:13px;color:var(--sub);line-height:1.6;margin-top:14px;flex:1}
.go{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:800;margin-top:16px}
.card.jp .go{color:var(--jp2)} .card.dz .go{color:var(--dz2)}
.go .arr{transition:transform .16s}
.card:hover .go .arr{transform:translateX(4px)}

.tagrow{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:700;padding:4px 9px;border-radius:20px;letter-spacing:.02em}
.card.jp .tag{background:rgba(78,161,255,.14);color:var(--jp1)}
.card.dz .tag{background:rgba(255,122,89,.14);color:var(--dz1)}

footer{margin-top:40px;text-align:center;color:var(--faint);font-size:12px;line-height:1.7}
footer a{color:var(--sub);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <header class="intro">
    <div class="eyebrow">Woojin · Workspace</div>
    <h1>두 개의 작은 도구</h1>
    <p>일본어를 외우는 카드와, 디자인 발주를 돕는 도구. 필요한 곳으로 들어가세요.</p>
  </header>

  <div class="cards">
    <a class="card jp" href="./jpcards/">
      <div class="glow"></div>
      <div class="emoji">🇯🇵</div>
      <h2>일본어 단어 카드</h2>
      <div class="ja">日本語 単語カード</div>
      <div class="desc">자주 쓰는 단어 363개를 간격 반복으로 암기. 음성·예문·문법 가이드까지.</div>
      <div class="tagrow">
        <span class="tag">플래시카드</span><span class="tag">음성</span><span class="tag">문법</span>
      </div>
      <div class="go">시작하기 <span class="arr">→</span></div>
    </a>

    <a class="card dz" href="./design/">
      <div class="glow"></div>
      <div class="emoji">🖨️</div>
      <h2>디자인 발주 도우미</h2>
      <div class="ja">设计发注 工具</div>
      <div class="desc">인쇄 발주를 위한 마진 주입·팬톤 색상 처리 도구. 발주 내역도 함께 관리.</div>
      <div class="tagrow">
        <span class="tag">프리프레스</span><span class="tag">팬톤</span><span class="tag">PDF</span>
      </div>
      <div class="go">시작하기 <span class="arr">→</span></div>
    </a>
  </div>

  <footer>
    made by Woojin · 한·중·일을 잇는 디자이너의 작업실
  </footer>
</div>
</body>
</html>
