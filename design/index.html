const PREPRESS_FONT_STACK = '"Nanum Gothic", "Noto Sans SC", "Microsoft YaHei", "PingFang SC", "Heiti SC", "Segoe UI", sans-serif';

// Global Pantone & Common color mapping dictionary for prepress accuracy
// Ref: Pantone Spot Color Formula Guide Book & ISO 12647 Print Standards
const PANTONE_MAP = {
  '186': '#C8102E', // Pantone Red 186 C
  '485': '#DA291C', // Bright Red 485 C
  '032': '#EF3340', // Red 032 C
  '245': '#D162B4', // Pantone Violet 245 C (Brings vivid purple-pink)
  '566': '#C2D7CE', // Pantone Sage Green 566 C (Brings muted pastel sage)
  '1225': '#FFC72C', // Pantone Warm Golden Yellow 1225 C
  '521': '#D5C5E3', // Pantone Light Lavender 521 C
  '6668': '#5B6770', // Pantone Slate Blue-Gray 6668 C
  '3945': '#E1F02C', // Pantone 3945 C (Bright Acid Lime-Yellow)
  '3536': '#89C7B6', // Pantone 3536 C (Muted Mint-Teal Green)
  '6163': '#D0DFD4', // Pantone 6163 C (Light Pastel Sage Green)
  '293': '#003DA5', // Blue 293 C
  '286': '#0033A0', // Blue 286 C
  '300': '#005BBB', // Blue 300 C
  '109': '#FED100', // Yellow 109 C
  '116': '#FFCD00', // Yellow 116 C
  '347': '#009A44', // Green 347 C
  '354': '#00B140', // Green 354 C
  '871': '#86724C', // Metallic Gold 871 C
  '872': '#85704D', // Metallic Gold 872 C
  '877': '#8A9A9B', // Metallic Silver 877 C
  'reflex blue': '#0A1172',
  'cool gray 9': '#75787B',
  'cool gray 11': '#53565A',
};

// Normalizes color names to ensure flawless matching between user inputs and ASE swatches
const normalizeColorName = (name) => {
  if (!name) return "";
  return name
    .toLowerCase()
    .replace(/pantone|pms/gi, "")
    .replace(/[^a-z0-9]/gi, "");
};

// Safe Hex converter helper for PDF-lib rgb normalization
const hexToRgb = (hex) => {
  const shorthandRegex = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
  const fullHex = hex.replace(shorthandRegex, (m, r, g, b) => r + r + g + g + b + b);
  const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(fullHex);
  return result ? {
    r: parseInt(result[1], 16) / 255,
    g: parseInt(result[2], 16) / 255,
    b: parseInt(result[3], 16) / 255
  } : { r: 0.8, g: 0.8, b: 0.8 };
};

// Beautiful procedural HSL to Hex generator for unmapped Pantone numbers
const hslToHex = (h, s, l) => {
  l /= 100;
  const a = (s * Math.min(l, 1 - l)) / 100;
  const f = (n) => {
    const k = (n + h / 30) % 12;
    const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
    return Math.round(255 * color).toString(16).padStart(2, '0');
  };
  return `#${f(0)}${f(8)}${f(4)}`;
};

// Procedural Spot Color Heuristic Generator based on Pantone numerical index 
const getHeuristicColor = (num) => {
  // Normalize 4-digit codes to 3-digit ranges for consistent mapping
  let base = num;
  if (num >= 1000 && num <= 9999) {
    if (num >= 1000 && num <= 1999) {
      base = Math.floor(num / 10);
    } else if (num >= 2000 && num <= 2999) {
      base = Math.floor(num / 10);
    } else if (num >= 3000 && num <= 3999) {
      base = Math.floor(num / 10);
    } else if (num >= 5000 && num <= 5999) {
      base = Math.floor(num / 10);
    } else if (num >= 6000 && num <= 6999) {
      base = Math.floor(num / 10);
    } else {
      base = num % 1000;
    }
  }

  if (base >= 100 && base <= 139) return hslToHex(48 + (base % 12), 95, 55); // Yellows
  if (base >= 140 && base <= 195) return hslToHex(12 + (base % 20), 95, 50); // Oranges
  if (base >= 196 && base <= 249) return hslToHex(335 + (base % 20), 90, 52); // Pinks
  if (base >= 250 && base <= 299) return hslToHex(265 + (base % 20), 85, 45); // Purples
  if (base >= 300 && base <= 329) return hslToHex(195 + (base % 20), 90, 48); // Blues
  if (base >= 330 && base <= 357) return hslToHex(160 + (base % 20), 85, 42); // Teals/Greens
  if (base >= 358 && base <= 399) return hslToHex(75 + (base % 20), 80, 50); // Limes
  if (base >= 400 && base <= 499) return hslToHex(28 + (base % 20), 30, 45);  // Browns
  if (base >= 500 && base <= 589) return hslToHex(145 + (base % 20), 20, 60); // Muted sage/gray
  if (base >= 600 && base <= 699) return hslToHex(282 + (base % 20), 25, 50); // Muted Plum
  if (base >= 700 && base <= 799) return hslToHex(205 + (base % 20), 25, 48); // Slate Blue
  if (base >= 800 && base <= 899) {
    if (base >= 871 && base <= 876) return '#86724C';
    return '#a1a1aa';
  }

  const hue = (base * 23) % 360;
  return hslToHex(hue, 70, 50);
};

// Convers LAB Color Space to sRGB safely (Highly crucial for Adobe Illustrator LAB ASE profiles)
const labToRgb = (l, a, b) => {
  let L = l * 100;
  let A = a;
  let B = b;

  if (Math.abs(a) <= 1.0 && Math.abs(b) <= 1.0) {
    A = a * 128;
    B = b * 128;
  }

  let y = (L + 16) / 116;
  let x = A / 500 + y;
  let z = y - B / 200;

  const fn = (v) => {
    return (v * v * v > 0.008856) ? v * v * v : (v - 16 / 116) / 7.787;
  };

  x = 0.95047 * fn(x);
  y = 1.00000 * fn(y);
  z = 1.08883 * fn(z);

  let r = x * 3.2406 + y * -1.5372 + z * -0.4986;
  let g = x * -0.9689 + y * 1.8758 + z * 0.0415;
  let b_rgb = x * 0.0557 + y * -0.2040 + z * 1.0570;

  const adjust = (v) => {
    v = v > 0.0031308 ? 1.055 * Math.pow(v, 1 / 2.4) - 0.055 : 12.92 * v;
    return Math.max(0, Math.min(255, Math.round(v * 255)));
  };

  return { r: adjust(r), g: adjust(g), b: adjust(b_rgb) };
};

// ASE (Adobe Swatch Exchange) Binary File Parser
const parseAseSwatches = (arrayBuffer) => {
  const view = new DataView(arrayBuffer);
  if (view.byteLength < 12) return [];
  
  const sig = String.fromCharCode(view.getUint8(0), view.getUint8(1), view.getUint8(2), view.getUint8(3));
  if (sig !== 'ASEF') {
    throw new Error('올바른 Adobe Swatch Exchange (.ase) 파일이 아닙니다.');
  }
  
  const blockCount = view.getUint32(8);
  let offset = 12;
  const swatches = [];
  
  for (let i = 0; i < blockCount; i++) {
    if (offset >= view.byteLength) break;
    const blockType = view.getUint16(offset);
    const blockLength = view.getUint32(offset + 2);
    offset += 6;
    
    if (blockType === 0x0001) {
      let blockOffset = offset;
      const nameLen = view.getUint16(blockOffset);
      blockOffset += 2;
      
      let name = '';
      for (let n = 0; nameLen > 0 && n < nameLen - 1; n++) {
        name += String.fromCharCode(view.getUint16(blockOffset));
        blockOffset += 2;
      }
      if (nameLen > 0) blockOffset += 2;
      
      const colorModel = String.fromCharCode(
        view.getUint8(blockOffset),
        view.getUint8(blockOffset + 1),
        view.getUint8(blockOffset + 2),
        view.getUint8(blockOffset + 3)
      ).trim();
      blockOffset += 4;
      
      let hex = '#cbd5e1';
      if (colorModel === 'RGB') {
        const r = Math.round(view.getFloat32(blockOffset) * 255);
        const g = Math.round(view.getFloat32(blockOffset + 4) * 255);
        const b = Math.round(view.getFloat32(blockOffset + 8) * 255);
        hex = '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
      } else if (colorModel === 'CMYK') {
        const c = view.getFloat32(blockOffset);
        const m = view.getFloat32(blockOffset + 4);
        const y = view.getFloat32(blockOffset + 8);
        const k = view.getFloat32(blockOffset + 12);
        
        const r = Math.round(255 * (1 - c) * (1 - k));
        const g = Math.round(255 * (1 - m) * (1 - k));
        const b = Math.round(255 * (1 - y) * (1 - k));
        hex = '#' + [r, g, b].map(x => Math.max(0, Math.min(255, x)).toString(16).padStart(2, '0')).join('');
      } else if (colorModel === 'LAB') {
        const l = view.getFloat32(blockOffset, false);
        const a = view.getFloat32(blockOffset + 4, false);
        const b = view.getFloat32(blockOffset + 8, false);
        const rgbVal = labToRgb(l, a, b);
        hex = '#' + [rgbVal.r, rgbVal.g, rgbVal.b].map(x => x.toString(16).padStart(2, '0')).join('');
      } else if (colorModel === 'Gray') {
        const gray = Math.round(view.getFloat32(blockOffset) * 255);
        hex = '#' + [gray, gray, gray].map(x => x.toString(16).padStart(2, '0')).join('');
      }
      
      swatches.push({ name: name || `Swatch ${swatches.length + 1}`, hex });
    }
    offset += blockLength;
  }
  return swatches;
};

// Formats the selected design type nicely into CJK bilingual form
const getDesignTypeString = (type, custom) => {
  if (type === '글루 용기 라벨') return '글루 용기 라벨 / 胶水容器 标签';
  if (type === '글루 파우치 라벨') return '글루 파우치 라벨 / 胶水铝箔袋 标签';
  if (type === '펌제 파우치 인쇄') return '펌제 파우치 인쇄 / 烫剂小袋 印刷';
  if (type === '단상자') return '단상자 / 包装盒';
  if (type === '용기 실크인쇄') return '용기 실크인쇄 / 容器 丝印';
  if (type === '기타') return `${custom || '기타'} / 其它`;
  return '미지정 / 未指定';
};

// Prepress Color Spec String Parser using advanced CJK Tokenizer
const parseColorInput = (input, dynamicAseMap = {}) => {
  if (!input) return [];
  
  // Protect CMYK commas before parsing
  let placeholder = input;
  const cmykMatches = [];
  const cmykRegex = /(?:cmyk\s*)?\d{1,3}\s*,\s*(\d{1,3})\s*,\s*(\d{1,3})\s*,\s*(\d{1,3})/gi;
  
  let match;
  let id = 0;
  while ((match = cmykRegex.exec(input)) !== null) {
    const key = `__CMYK_PLACEHOLDER_${id}__`;
    cmykMatches.push({ key, val: match[0] });
    placeholder = placeholder.replace(match[0], key);
    id++;
  }
  
  const parts = placeholder.split(/[,/|]/);
  
  const finalColors = parts.map(part => {
    let trimmed = part.trim();
    if (!trimmed) return null;
    
    // Restore CMYK
    const matchCmyk = cmykMatches.find(m => trimmed.includes(m.key));
    if (matchCmyk) {
      trimmed = trimmed.replace(matchCmyk.key, matchCmyk.val);
    }
    
    const trimPartLower = trimmed.toLowerCase();
    const normPart = normalizeColorName(trimmed);
    
    // 0. Prioritize exact matching from User Uploaded & learned .ase swatches!
    if (dynamicAseMap[normPart]) {
      return { name: trimmed, hex: dynamicAseMap[normPart] };
    }
    if (dynamicAseMap[trimPartLower]) {
      return { name: trimmed, hex: dynamicAseMap[trimPartLower] };
    }
    
    // 1. Detect Hex values
    const hexMatch = trimPartLower.match(/#([0-9a-f]{3,6})/);
    if (hexMatch) {
      return { name: trimmed, hex: `#${hexMatch[1]}` };
    }
    
    // 2. Detect CMYK
    const cmykMatch = trimPartLower.match(/(?:cmyk|c)?\s*(\d+)\s*[\s,/\-]?\s*(?:m)?\s*(\d+)\s*[\s,/\-]?\s*(?:y)?\s*(\d+)\s*[\s,/\-]?\s*(?:k)?\s*(\d+)/i);
    if (cmykMatch) {
      const c = parseInt(cmykMatch[1]) / 100;
      const m = parseInt(cmykMatch[2]) / 100;
      const y = parseInt(cmykMatch[3]) / 100;
      const k = parseInt(cmykMatch[4]) / 100;
      
      const r = Math.round(255 * (1 - c) * (1 - k));
      const g = Math.round(255 * (1 - m) * (1 - k));
      const b = Math.round(255 * (1 - y) * (1 - k));
      
      const toHex = (num) => {
        const hex = Math.max(0, Math.min(255, num)).toString(16);
        return hex.length === 1 ? '0' + hex : hex;
      };
      return { name: trimmed, hex: `#${toHex(r)}${toHex(g)}${toHex(b)}` };
    }
    
    // 3. Detect standard Spot Pantone numbers
    const pantoneMatch = trimPartLower.match(/(?:pantone|pms)?\s*([0-9a-z\s]+)/);
    if (pantoneMatch) {
      const code = pantoneMatch[1].trim();
      if (PANTONE_MAP[code]) {
        return { name: trimmed, hex: PANTONE_MAP[code] };
      }
      const digitsMatch = code.match(/\d+/);
      if (digitsMatch) {
        let num = parseInt(digitsMatch[0]);
        if (PANTONE_MAP[num.toString()]) {
          return { name: trimmed, hex: PANTONE_MAP[num.toString()] };
        }
        const hex = getHeuristicColor(num);
        return { name: trimmed, hex };
      }
    }
    
    // 4. Common colors
    const COMMON_COLORS = {
      'red': '#FF0000', 'green': '#008000', 'blue': '#0000FF', 'yellow': '#FFFF00',
      'black': '#000000', 'white': '#FFFFFF', 'gold': '#D4AF37', 'silver': '#C0C0C0',
      'bronze': '#CD7F32', 'orange': '#FFA500', 'purple': '#800080', 'pink': '#FFC0CB',
      'brown': '#A52A2A', 'grey': '#808080', 'gray': '#808080'
    };
    if (COMMON_COLORS[trimPartLower]) {
      return { name: trimmed, hex: COMMON_COLORS[trimPartLower] };
    }
    
    return { name: trimmed, hex: '#cbd5e1' };
  }).filter(Boolean);
  
  return finalColors;
};

function App() {
  const [formData, setFormData] = useState({
    companyName: '',
    projectName: '',
    date: new Date().toISOString().split('T')[0],
    colors: '',
    finish: '무광',
    isTransparent: false,
    foil: '없음',
    isHologram: false,
    isRoll: false,
    unwindDirection: '상',
    remarks: '',
    designType: '글루 용기 라벨',
    customDesignType: '',
  });

  const [uploadedFile, setUploadedFile] = useState(null);
  const [fileType, setFileType] = useState(null);
  const [filePreviewUrl, setFilePreviewUrl] = useState(null);
  const [marginPosition, setMarginPosition] = useState('top');
  const [marginSize, setMarginSize] = useState(180); // Margin height in points (increased to 180 as requested)
  const [dynamicAseMap, setDynamicAseColors] = useState({}); // Learned swatches
  const [aseStatusMessage, setAseStatusMessage] = useState(''); // Toast UI message for ASE upload
  
  const [processing, setProcessing] = useState(false);
  const [processingMessage, setProcessingMessage] = useState('인쇄 여백 병합 및 주입 중...');
  const [error, setError] = useState(null);
  const [ordersHistory, setOrdersHistory] = useState([]);
  const [activeTab, setActiveTab] = useState('injector');
  const [pdfLibReady, setPdfLibReady] = useState(false);
  const [cachedFontBytes, setCachedFontBytes] = useState(null);
  const [cachedChineseFontBytes, setCachedChineseFontBytes] = useState(null);
  const [isOfflineFallback, setIsOfflineFallback] = useState(false);

  // Safely inject Google Web Fonts into head
  useEffect(() => {
    const link1 = document.createElement('link');
    link1.rel = 'preconnect';
    link1.href = 'https://fonts.googleapis.com';
    document.head.appendChild(link1);

    const link2 = document.createElement('link');
    link2.rel = 'preconnect';
    link2.href = 'https://fonts.gstatic.com';
    link2.crossOrigin = 'anonymous';
    document.head.appendChild(link2);

    const link3 = document.createElement('link');
    link3.rel = 'stylesheet';
    link3.href = 'https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&family=Noto+Sans+SC:wght@400;700&swap';
    document.head.appendChild(link3);

    return () => {
      if (document.head.contains(link1)) document.head.removeChild(link1);
      if (document.head.contains(link2)) document.head.removeChild(link2);
      if (document.head.contains(link3)) document.head.removeChild(link3);
    };
  }, []);

  // Load pdf-lib & fontkit dynamic CDNs safely
  useEffect(() => {
    const scriptPdf = document.createElement('script');
    scriptPdf.src = 'https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js';
    scriptPdf.async = true;
    
    scriptPdf.onload = () => {
      const scriptFontkit = document.createElement('script');
      scriptFontkit.src = 'https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js';
      scriptFontkit.async = true;
      scriptFontkit.onload = () => {
        setPdfLibReady(true);
      };
      scriptFontkit.onerror = () => {
        console.error("Failed to load fontkit CDN.");
        setPdfLibReady(true);
      };
      document.body.appendChild(scriptFontkit);
    };
    scriptPdf.onerror = () => console.error("Failed to load pdf-lib CDN.");
    document.body.appendChild(scriptPdf);

    return () => {};
  }, []);

  // Load history & learned persistent swatches from localStorage
  useEffect(() => {
    const saved = localStorage.getItem('design_orders_history');
    if (saved) {
      try {
        setOrdersHistory(JSON.parse(saved));
      } catch (e) {
        console.error("Failed to parse history", e);
      }
    }

    const learnedSwatches = localStorage.getItem('prepress_learned_swatches');
    if (learnedSwatches) {
      try {
        setDynamicAseColors(JSON.parse(learnedSwatches));
      } catch (e) {
        console.error("Failed to parse learned swatches", e);
      }
    }
  }, []);

  const saveToHistory = (dataToSave) => {
    const updated = [
      { ...dataToSave, id: Date.now() },
      ...ordersHistory
    ].slice(0, 50);
    setOrdersHistory(updated);
    localStorage.setItem('design_orders_history', JSON.stringify(updated));
  };

  const handleFileChange = (e) => {
    const file = e.target.files[0];
    if (file) {
      setUploadedFile(file);
      setError(null);
      
      const isPDF = file.type === 'application/pdf' || file.name.endsWith('.pdf');
      const isImg = file.type.startsWith('image/');

      if (isPDF) {
        setFileType('pdf');
        setFilePreviewUrl(null);
      } else if (isImg) {
        setFileType('image');
        const reader = new FileReader();
        reader.onloadend = () => {
          setFilePreviewUrl(reader.result);
        };
        reader.readAsDataURL(file);
      } else {
        setError("지원하지 않는 파일 형식입니다. PDF 또는 이미지(PNG, JPG) 파일을 업로드해주세요.");
        setUploadedFile(null);
        setFileType(null);
        setFilePreviewUrl(null);
      }
    }
  };

  // ASE Swatch File Handler
  const handleAseUpload = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const swatches = parseAseSwatches(event.target.result);
          if (swatches.length === 0) {
            setError("ASE 파일에서 유효한 색상 스와치를 찾지 못했습니다.");
            return;
          }
          
          // Learn swatches into the system
          const newAseMap = { ...dynamicAseMap };
          swatches.forEach(s => {
            const rawKey = s.name.trim().toLowerCase();
            const normKey = normalizeColorName(s.name);
            
            newAseMap[rawKey] = s.hex;
            if (normKey) {
              newAseMap[normKey] = s.hex;
            }
          });
          
          // Persist the learned swatches inside local storage
          setDynamicAseColors(newAseMap);
          localStorage.setItem('prepress_learned_swatches', JSON.stringify(newAseMap));
          
          // Show a beautiful success message
          setAseStatusMessage(`성공: ${swatches.length}개의 색상을 시스템에 영구 학습시켰습니다! 이제 '지정색상' 입력창에 이 색상명만 기입하면 컬러칩이 자동 표시됩니다.`);
          setError(null);
          
          setTimeout(() => {
            setAseStatusMessage('');
          }, 6000);
        } catch (err) {
          setError(`ASE 파싱 오류: ${err.message}`);
        }
      };
      reader.readAsArrayBuffer(file);
    }
  };

  // Safe Multi-CDN Korean font downloader
  const getKoreanFontBytes = async () => {
    if (cachedFontBytes) return cachedFontBytes;
    setProcessingMessage('한글 폰트 엔진 패키징 중... (최초 1회만 수행)');

    const fontUrls = [
      'https://fonts.gstatic.com/s/nanumgothic/v23/PN_oR9W2q0v7995O6v3q_Lp8_X7uK.ttf', // Google Fonts direct CDN
      'https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/nanumgothic/NanumGothic-Regular.ttf', // jsDelivr Global Mirror
      'https://unpkg.com/@canvas-fonts/nanum-gothic@1.1.1/NanumGothic.ttf' // unpkg Backup Mirror
    ];

    for (let i = 0; i < fontUrls.length; i++) {
      try {
        const response = await fetch(fontUrls[i]);
        if (response.ok) {
          const bytes = await response.arrayBuffer();
          setCachedFontBytes(bytes);
          setIsOfflineFallback(false);
          return bytes;
        }
      } catch (err) {
        console.warn(`Korean font fetch failed from URL ${i + 1}:`, err);
      }
    }
    
    // Trigger offline/CSP restrictions fallback triggers
    setIsOfflineFallback(true);
    return null;
  };

  // Safe Chinese Font downloader (Unifies to 100% Sans-Serif style)
  const getChineseFontBytes = async () => {
    if (cachedChineseFontBytes) return cachedChineseFontBytes;
    setProcessingMessage('중국어 폰트 라이브러리 구성 중... (최초 1회만 수행)');

    const fontUrls = [
      'https://unpkg.com/@canvas-fonts/noto-sans-sc@1.0.0/NotoSansSC-Regular.ttf', // Noto Sans SC
      'https://cdn.jsdelivr.net/npm/@canvas-fonts/noto-sans-sc@1.0.0/NotoSansSC-Regular.ttf'
    ];

    for (let i = 0; i < fontUrls.length; i++) {
      try {
        const response = await fetch(fontUrls[i]);
        if (response.ok) {
          const bytes = await response.arrayBuffer();
          setCachedChineseFontBytes(bytes);
          return bytes;
        }
      } catch (err) {
        console.warn(`Chinese font fetch failed from URL ${i + 1}:`, err);
      }
    }
    return null;
  };

  const sanitizeToAscii = (text) => {
    if (!text) return 'None';
    let output = text
      .replace(/고객사명 \/ 客户名称:/g, 'CLIENT NAME:')
      .replace(/프로젝트명 \/ 项目名称:/g, 'PROJECT TITLE:')
      .replace(/발주일자 \/ 下单日期:/g, 'ORDER DATE:')
      .replace(/비고 \/ 备注:/g, 'REMARKS:')
      .replace(/지정색상 \/ 印刷颜色:/g, 'COLORS SPEC:')
      .replace(/코팅가공 \/ 表面加工:/g, 'COATING / FINISH:')
      .replace(/투명원단 여부 \/ 是否透明:/g, 'TRANSPARENT STOCK:')
      .replace(/박, 홀로그램 \/ 烫金, 全息:/g, 'FOIL / HOLO:')
      .replace(/롤 풀림방향\(또는 부착방향\) \/ 卷筒展开方向（或出标方向）:/g, 'WINDING DIRECTION:')
      .replace(/무광 \/ 哑光 \(Matte\)/g, 'Matte')
      .replace(/유광 \/ 亮光 \(Glossy\)/g, 'Glossy')
      .replace(/금박 \/ 烫金/g, 'Gold Foil')
      .replace(/은박 \/ 烫银/g, 'Silver Foil')
      .replace(/없음 \/ 无/g, 'None')
      .replace(/기타 \/ 其它/g, 'Other')
      .replace(/해당없음 \/ 无 \(Sheet\)/g, 'N/A')
      .replace(/투명 원단 \/ 透明材质/g, 'Transparent Base')
      .replace(/일반 원단 \/ 普通材质/g, 'Opaque Base')
      .replace(/롤 제작 \/ 卷筒装/g, 'Roll')
      .replace(/상 \/ 上/g, 'TOP')
      .replace(/하 \/ 下/g, 'BOTTOM')
      .replace(/좌 \/ 左/g, 'LEFT')
      .replace(/우 \/ 右/g, 'RIGHT');

    return output.replace(/[^\x00-\x7F]/g, '?');
  };

  // High-DPI Canvas Rendering Engine (Preloads and synchronizes styles to prevent sudden font changes)
  const generateSlugImage = async (width, marginSize, formData, dynamicAseMap = {}) => {
    const scale = 4; // 300+ DPI
    const canvas = document.createElement('canvas');
    canvas.width = width * scale;
    canvas.height = marginSize * scale;
    const ctx = canvas.getContext('2d');

    // Prepress loading synchronizer: Force Await actual browser font compile before drawing
    try {
      if (document.fonts) {
        await Promise.all([
          document.fonts.load(`bold ${14.5 * scale}px "Nanum Gothic"`),
          document.fonts.load(`bold ${14.5 * scale}px "Noto Sans SC"`)
        ]);
      }
    } catch (e) {
      console.warn("Async Webfont preloading timed out. Rendering with local fallbacks.", e);
    }

    // Determine layout: Switch to single column for narrow packaging / labels
    const isSingleColumn = width < 550;
    const scaleLabelSize = isSingleColumn ? 9.5 : 12.5;
    const scaleValueSize = isSingleColumn ? 10.0 : 13.0;
    const scaleTitleSize = isSingleColumn ? 11.5 : 14.5;
    const labelWidth = isSingleColumn ? 135 : 155;
    const rightColX = isSingleColumn ? 20 : (width / 2);

    // Responsive Row Y Offset Spacing
    const yClient = isSingleColumn ? 35 : 45;
    const yProject = isSingleColumn ? 48 : 67;
    const yDesignType = isSingleColumn ? 61 : 89; // NEW
    const yDate = isSingleColumn ? 74 : 111;
    const yRemarks = isSingleColumn ? 169 : 133;
    
    const yColors = isSingleColumn ? 87 : 31;
    const yWarn1 = isSingleColumn ? 100 : 48;
    const yWarn2 = isSingleColumn ? 111 : 60;
    
    const yFinish = isSingleColumn ? 122 : 78;
    const yTrans = isSingleColumn ? 134 : 101;
    const yPost = isSingleColumn ? 146 : 124;
    const yWinding = isSingleColumn ? 158 : 145;

    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    // Background
    ctx.fillStyle = '#f8fafc';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Red Bilingual Title
    ctx.fillStyle = '#b91c1c';
    ctx.font = `bold ${scaleTitleSize * scale}px ${PREPRESS_FONT_STACK}`;
    ctx.textBaseline = 'top';
    ctx.fillText('디자인 발주 요청서 / 设计下单申请书', 20 * scale, 15 * scale);

    const drawRow = (label, value, x, y, lWidth = labelWidth, isRedValue = false) => {
      // Label with slate color
      ctx.fillStyle = '#475569';
      ctx.font = `bold ${scaleLabelSize * scale}px ${PREPRESS_FONT_STACK}`;
      ctx.fillText(label, x * scale, y * scale);

      // Value with dark slate color (or Red if specified)
      ctx.fillStyle = isRedValue ? '#dc2626' : '#0f172a';
      ctx.font = `${scaleValueSize * scale}px ${PREPRESS_FONT_STACK}`;
      ctx.fillText(value || 'None', (x + lWidth) * scale, y * scale);
    };

    // Metadata left side
    drawRow('고객사명 / 客户名称:', formData.companyName || '미지정 / 未指定', 20, yClient, labelWidth);
    drawRow('프로젝트명 / 项目名称:', formData.projectName || '미지정 / 未指定', 20, yProject, labelWidth);
    drawRow('디자인 유형 / 设计类型:', getDesignTypeString(formData.designType, formData.customDesignType), 20, yDesignType, labelWidth);
    drawRow('발주일자 / 下单日期:', formData.date, 20, yDate, labelWidth);
    
    // Remarks (비고) in red text
    drawRow('비고 / 备注:', formData.remarks || '없음 / 无', 20, yRemarks, labelWidth, true);

    // Technical specifications right side
    ctx.fillStyle = '#475569';
    ctx.font = `bold ${scaleLabelSize * scale}px ${PREPRESS_FONT_STACK}`;
    ctx.fillText('지정색상 / 印刷颜色:', rightColX * scale, yColors * scale);

    const colorChips = parseColorInput(formData.colors, dynamicAseMap);
    
    // Dynamic Winding layout text width measurements to absolutely prevent overlap
    const windLabel1 = '롤 풀림방향 / 卷筒展开方向';
    const windLabel2 = '(또는 부착방향) / (或出标方向) :';
    ctx.font = `bold ${scaleLabelSize * scale}px ${PREPRESS_FONT_STACK}`;
    const wWidth1 = ctx.measureText(windLabel1).width;
    const wWidth2 = ctx.measureText(windLabel2).width;
    const maxWindLabelWidth = Math.max(wWidth1, wWidth2) / scale; // Back to PT scale

    // Dynamic horizontal position for the winding arrow symbol (Gives safe 15pt gap)
    const windingValX = rightColX + maxWindLabelWidth + 15;

    let currentValX = (rightColX + labelWidth) * scale;
    ctx.font = `${scaleValueSize * scale}px ${PREPRESS_FONT_STACK}`;

    if (colorChips.length > 0) {
      colorChips.forEach((chip, idx) => {
        // Draw color box first (Resized to 11.5x11.5 to match 13pt font)
        ctx.fillStyle = chip.hex;
        ctx.fillRect(currentValX, (yColors + 1) * scale, (isSingleColumn ? 9 : 11.5) * scale, (isSingleColumn ? 9 : 11.5) * scale);
        ctx.strokeStyle = '#cbd5e1';
        ctx.lineWidth = 0.5 * scale;
        ctx.strokeRect(currentValX, (yColors + 1) * scale, (isSingleColumn ? 9 : 11.5) * scale, (isSingleColumn ? 9 : 11.5) * scale);
        
        currentValX += (isSingleColumn ? 13 : 16) * scale; // move past the box + space
        
        // Draw text label - Unifying color-code font with standard PREPRESS_FONT_STACK (13.0pt)
        ctx.fillStyle = '#0f172a';
        ctx.font = `${scaleValueSize * scale}px ${PREPRESS_FONT_STACK}`;
        ctx.fillText(chip.name, currentValX, yColors * scale);
        currentValX += ctx.measureText(chip.name).width;
        
        // Draw separate comma if not the last item
        if (idx < colorChips.length - 1) {
          ctx.fillText(', ', currentValX, yColors * scale);
          currentValX += ctx.measureText(', ').width;
        }
      });
      
      // Draw Split Double-Line warning text to prevent edge cutoff (Enlarged to 8.5pt)
      ctx.fillStyle = '#dc2626'; // Vivid red
      ctx.font = `bold ${(isSingleColumn ? 6.8 : 8.5) * scale}px ${PREPRESS_FONT_STACK}`;
      ctx.fillText('주의: 위 컬러박스는 단순 시각적 참고용으로 실제 컬러 코드와 다릅니다. 컬러코드 텍스트만 참고하세요.', (rightColX + labelWidth) * scale, yWarn1 * scale);
      ctx.fillText('贴心提示：以上色块仅供视觉参考，与实际颜色代码不同。请仅参考颜色代码文本。', (rightColX + labelWidth) * scale, yWarn2 * scale);
    } else {
      const colorVal = formData.colors || '기본도수 / 普通印刷';
      ctx.fillStyle = '#0f172a';
      ctx.font = `${scaleValueSize * scale}px ${PREPRESS_FONT_STACK}`;
      ctx.fillText(colorVal, currentValX, yColors * scale);
    }

    // FIX: Rectified typo from '무광 / 哑광' and '유광 / 亮광' to '哑光' and '亮光'
    let finishTxt = formData.finish === '무광' ? '무광 / 哑光 (Matte)' : formData.finish === '유광' ? '유광 / 亮光 (Glossy)' : formData.finish;
    drawRow('코팅가공 / 表面加工:', finishTxt, rightColX, yFinish, labelWidth);
    
    // Render isTransparent value as "예(투명) / 是(...)"
    let transTxt = formData.isTransparent ? '예(투명) / 是(透明)' : '아니오(불투명) / 否(不透明)';
    drawRow('투명원단 여부 / 是否透明:', transTxt, rightColX, yTrans, labelWidth);
    
    // Restructured Post-processing bilingual strings natively
    let postProcessingKo = '';
    let postProcessingZh = '';
    if (formData.foil !== '없음') {
      if (formData.foil === '금박') {
        postProcessingKo = '금박'; postProcessingZh = '烫金';
      } else if (formData.foil === '은박' || formData.foil === '銀박') {
        postProcessingKo = '은박'; postProcessingZh = '烫银';
      } else {
        postProcessingKo = formData.foil; postProcessingZh = '其它';
      }
    }
    if (formData.isHologram) {
      if (postProcessingKo) {
        postProcessingKo += ' + 홀로그램'; postProcessingZh += ' + 全息';
      } else {
        postProcessingKo = '홀로그램'; postProcessingZh = '全息';
      }
    }
    if (!postProcessingKo) {
      postProcessingKo = '없음'; postProcessingZh = '无';
    }
    const postProcessingCombined = `${postProcessingKo} / ${postProcessingZh}`;
    
    drawRow('박, 홀로그램 / 烫金, 全息:', postProcessingCombined, rightColX, yPost, labelWidth);

    // Winding direction - Split the long label into two lines as requested!
    ctx.fillStyle = '#475569';
    ctx.font = `bold ${scaleLabelSize * scale}px ${PREPRESS_FONT_STACK}`;
    ctx.fillText(windLabel1, rightColX * scale, yWinding * scale);
    ctx.fillText(windLabel2, rightColX * scale, (yWinding + (isSingleColumn ? 11 : 13)) * scale);

    let winding = '해당없음 / 无';
    if (formData.isRoll) {
      winding = formData.unwindDirection === '상' ? '↑' : formData.unwindDirection === '하' ? '↓' : formData.unwindDirection === '좌' ? '←' : '→';
    }
    
    // Render winding indicator arrow vertically centered and enlarged to cover both rows beautifully
    // Render winding indicator with standard size if "해당없음 / 无" to prevent giant text overlap!
    const isWindingArrow = formData.isRoll;
    const finalWindingSize = isWindingArrow ? (isSingleColumn ? 16.0 : 25.0) : (isSingleColumn ? 10.0 : 13.0);
    const windingYOffset = isWindingArrow ? (isSingleColumn ? 5 : 6) : (isSingleColumn ? 11 : 13);

    ctx.fillStyle = '#0184c7'; // Professional Accent Blue
    ctx.font = `bold ${finalWindingSize * scale}px ${PREPRESS_FONT_STACK}`; // Dynamic font size applied
    ctx.fillText(winding, windingValX * scale, (yWinding + windingYOffset) * scale);

    // Export memory canvas to data URL
    const dataUrl = canvas.toDataURL('image/png');
    const res = await fetch(dataUrl);
    return await res.arrayBuffer();
  };

  // Perform Prepress Slug Injection and Download
  const handleInjectAndDownload = async () => {
    if (!uploadedFile) {
      setError("발주 정보를 추가할 원본 PDF 또는 이미지 파일을 먼저 업로드해주세요.");
      return;
    }
    if (!pdfLibReady || !window.PDFLib) {
      setError("PDF 라이브러리가 아직 로드되지 않았습니다. 잠시만 기다려주세요.");
      return;
    }

    setProcessing(true);
    setProcessingMessage('인쇄 여백 및 CJK 폰트 처리 중...');
    setError(null);

    try {
      const { PDFDocument, rgb, StandardFonts } = window.PDFLib;
      
      const [fontBytes, chineseFontBytes] = await Promise.all([
        getKoreanFontBytes(),
        getChineseFontBytes()
      ]);
      
      const fileBytes = await uploadedFile.arrayBuffer();
      let finalPdfDoc;

      const hasFonts = fontBytes && chineseFontBytes && window.fontkit;

      let postProcessingKo = '';
      let postProcessingZh = '';
      if (formData.foil !== '없음') {
        if (formData.foil === '금박') {
          postProcessingKo = '금박'; postProcessingZh = '烫金';
        } else if (formData.foil === '은박') {
          postProcessingKo = '은박'; postProcessingZh = '烫银';
        } else {
          postProcessingKo = formData.foil; postProcessingZh = '其它';
        }
      }
      if (formData.isHologram) {
        if (postProcessingKo) {
          postProcessingKo += ' + 홀로그램'; postProcessingZh += ' + 全息';
        } else {
          postProcessingKo = '홀로그램'; postProcessingZh = '全息';
        }
      }
      if (!postProcessingKo) {
        postProcessingKo = '없음'; postProcessingZh = '无';
      }
      const postProcessingCombined = `${postProcessingKo} / ${postProcessingZh}`;

      if (fileType === 'pdf') {
        const srcPdfDoc = await PDFDocument.load(fileBytes);
        finalPdfDoc = await PDFDocument.create();
        
        // Register fontkit library to pdf-lib document for custom TTF font parsing
        if (window.fontkit) {
          finalPdfDoc.registerFontkit(window.fontkit);
        } else {
          console.warn("Fontkit is not available.");
        }
        
        let customFont;
        let chineseFont;

        if (hasFonts) {
          customFont = await finalPdfDoc.embedFont(fontBytes);
          chineseFont = await finalPdfDoc.embedFont(chineseFontBytes);
        } else {
          customFont = await finalPdfDoc.embedFont(StandardFonts.HelveticaBold);
          chineseFont = customFont;
        }

        const pages = srcPdfDoc.getPages();
        
        for (let i = 0; i < pages.length; i++) {
          setProcessingMessage(`총 ${pages.length}페이지 중 ${i + 1}페이지 여백 병합 중...`);
          const srcPage = pages[i];
          const { width, height = 100 } = srcPage.getSize();
          
          const newPage = finalPdfDoc.addPage([width, height + marginSize]);
          const [embeddedPage] = await finalPdfDoc.embedPages([srcPage]);
          
          let drawYOfOriginal = 0;
          let slugYStart = 0;

          if (marginPosition === 'top') {
            drawYOfOriginal = 0;
            slugYStart = height;
          } else {
            drawYOfOriginal = marginSize;
            slugYStart = 0;
          }

          newPage.drawPage(embeddedPage, {
            x: 0,
            y: drawYOfOriginal,
            width: width,
            height: height,
          });

          const isSingleColumn = width < 550;
          const sizeLabel = isSingleColumn ? 9.5 : 12.5;
          const sizeVal = isSingleColumn ? 10.0 : 13.0;
          const labelW = isSingleColumn ? 135 : 155;
          const rightColX = isSingleColumn ? 20 : (width / 2);

          const yClient = isSingleColumn ? (marginSize - 35) : (marginSize - 45);
          const yProject = isSingleColumn ? (marginSize - 48) : (marginSize - 67);
          const yDesignType = isSingleColumn ? (marginSize - 61) : (marginSize - 89); // NEW
          const yDate = isSingleColumn ? (marginSize - 74) : (marginSize - 111);
          const yRemarks = isSingleColumn ? (marginSize - 173) : (marginSize - 133);
          
          const yColors = isSingleColumn ? (marginSize - 74) : (marginSize - 31);
          const yWarn1 = isSingleColumn ? (marginSize - 100) : (marginSize - 48);
          const yWarn2 = isSingleColumn ? (marginSize - 111) : (marginSize - 60);
          
          const yFinish = isSingleColumn ? (marginSize - 111) : (marginSize - 78);
          const yTrans = isSingleColumn ? (marginSize - 124) : (marginSize - 101);
          const yPost = isSingleColumn ? (marginSize - 137) : (marginSize - 124);
          const yWinding = isSingleColumn ? (marginSize - 150) : (marginSize - 145);

          if (hasFonts) {
            newPage.drawRectangle({
              x: 0,
              y: slugYStart,
              width: width,
              height: marginSize,
              color: rgb(0.97, 0.98, 0.99),
            });

            newPage.drawLine({
              start: { x: 0, y: marginPosition === 'top' ? slugYStart : marginSize },
              end: { x: width, y: marginPosition === 'top' ? slugYStart : marginSize },
              thickness: 2,
              color: rgb(0.08, 0.12, 0.2),
            });

            // Added 'isRedValue' parameter support to drawSlugText in vector mode
            const drawSlugText = (label, value, x, y, labelWidth = labelW, isRedValue = false) => {

              const finalValue = hasFonts ? value : sanitizeToAscii(value);
              const valueColor = isRedValue ? rgb(0.86, 0.15, 0.15) : rgb(0.05, 0.05, 0.1);
              
              if (hasFonts) {
                const labelParts = finalLabel.split(' / ');
                let currentX = x;
                
                if (labelParts.length > 1) {
                  newPage.drawText(labelParts[0], {

                  newPage.drawText(' / ', {

                    y: slugYStart + y,
                    size: sizeLabel,
                    font: customFont,
                    color: rgb(0.3, 0.35, 0.4),

                  currentX += customFont.widthOfTextAtSize(' / ', sizeLabel);
                  
                  newPage.drawText(labelParts[1], {

                } else {
                  newPage.drawText(label, {
                    x: currentX,
                    y: slugYStart + y,
                    size: sizeLabel,
                    font: customFont,
                    color: rgb(0.3, 0.35, 0.4),
                  });
                }

                let currentValX = x + labelWidth;
                const valParts = finalValue.split(' / ');
                
                if (valParts.length > 1) {
                  newPage.drawText(valParts[0], {
                    x: currentValX,
                    y: slugYStart + y,
                    size: sizeVal,
                    font: customFont,
                    color: valueColor,
                  });
                  currentValX += customFont.widthOfTextAtSize(valParts[0], sizeVal);
                  
                  newPage.drawText(' / ', {
                    x: currentValX,
                    y: slugYStart + y,
                    size: sizeVal,
                    font: customFont,
                    color: valueColor,
                  });
                  currentValX += customFont.widthOfTextAtSize(' / ', sizeVal);
                  
                  newPage.drawText(valParts[1], {
                    x: currentValX,
                    y: slugYStart + y,
                    size: sizeVal,
                    font: chineseFont,
                    color: valueColor,

                } else {
                  const hasChinese = /[\u4e00-\u9fa5]/.test(value);

                newPage.drawText(finalValue, {

            const legendTitle = '디자인 발주 요청서 / 设计下单申请书';
